<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0F0F0F" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="BFN" />
    <meta name="description" content="Better Fit Notes — Mobile-first workout tracker" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="manifest" href="/manifest.json" />
    <title>Better Fit Notes</title>
    <script>
      // Apply theme before render to prevent flash
      (function () {
        var s = localStorage.getItem('bfn-settings');
        var theme = 'dark';
        try { theme = JSON.parse(s).state.settings.theme || 'dark'; } catch (_) {}
        var dark = theme === 'dark' || (theme === 'system' && window.matchMedia('(prefers-color-scheme: dark)').matches);
        var root = document.documentElement;
        root.classList.add(dark ? 'dark' : 'light');
        root.style.colorScheme = dark ? 'dark' : 'light';
      })();
    </script>
    <style>
      html, body, #root { margin: 0; padding: 0; height: 100%; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
